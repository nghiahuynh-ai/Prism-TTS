# Training defaults for PrismTTSLightning + Lightning Trainer.

trainer:
  seed: 42
  seed_workers: true

  lightning_module:
    learning_rate: 3.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.95]
    eval_every_n_steps: 5000
    audio_sample_rate: 24000
    max_audio_samples: 2
    ema_decay: 0.999
    ema_start_step: 0
    ema_update_every_n_steps: 1
    ema_warmup_steps: 0
    use_ema_for_validation: true
    use_ema_for_periodic_eval: true
    sync_dist_logging: false

  optimizer:
    name: adamw

  scheduler:
    name: cosine_with_warmup
    enabled: true
    warmup_steps: 2000
    min_lr_ratio: 0.1

  lightning_trainer:
    accelerator: auto
    devices: 1
    strategy: auto
    precision: bf16-mixed
    max_steps: 300000
    min_steps: 0
    gradient_clip_val: 1.0
    accumulate_grad_batches: 1
    log_every_n_steps: 10
    val_check_interval: 1000
    num_sanity_val_steps: 2
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    benchmark: true
    deterministic: false
    enable_checkpointing: true
    enable_progress_bar: true
    enable_model_summary: true

  checkpoint:
    dirpath: checkpoints
    filename: prism_tts-{step:07d}
    monitor: val/loss
    mode: min
    save_top_k: 3
    save_last: true
    every_n_train_steps: 1000

  logger:
    type: wandb
    project: prism_tts
    name: null
    save_dir: logs
    offline: false
    log_model: false
