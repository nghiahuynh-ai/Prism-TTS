# Training defaults for PrismTTSLightning + Lightning Trainer.

trainer:
  seed: null
  seed_workers: true

  lightning_module:
    learning_rate: 7.5e-5
    weight_decay: 0.01
    betas: [0.9, 0.95]
    eval_every_n_steps: 100000
    audio_sample_rate: 24000
    max_audio_samples: 2
    log_media_on_validation_end: true
    audio_decoder: models.mimi_latent_decoder.MimiPreUpsampleLatentDecoder
    audio_decoder_kwargs:
      pretrained_model_name_or_path: kyutai/mimi
      device: cuda
    ema_decay: 0.999
    ema_start_step: 0
    ema_update_every_n_steps: 1
    ema_warmup_steps: 0
    use_ema_for_validation: true
    use_ema_for_periodic_eval: true
    sync_dist_logging: false

  distributed:
    enabled: false
    accelerator: gpu
    devices: auto
    gpu_indices: null
    strategy: ddp_find_unused_parameters_false
    num_nodes: 1
    sync_dist_logging: true

  optimizer:
    name: adamw

  scheduler:
    name: cosine_with_warmup
    enabled: true
    warmup_steps: 50000
    min_lr_ratio: 0.1

  lightning_trainer:
    accelerator: auto
    devices: 1
    strategy: auto
    precision: 32
    max_steps: 1000000
    min_steps: 0
    gradient_clip_val: 1.0
    # With train_batch_size=2, this keeps effective batch ~= 8.
    accumulate_grad_batches: 1
    log_every_n_steps: 10
    val_check_interval: 100000
    num_sanity_val_steps: 2
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    benchmark: true
    deterministic: false
    enable_checkpointing: true
    enable_progress_bar: true
    enable_model_summary: true

  checkpoint:
    dirpath: checkpoints
    filename: prism_tts-{step:07d}
    monitor: val/loss
    mode: min
    save_top_k: 3
    save_last: true
    every_n_train_steps: 50000
    save_every_validation_stage: true
    every_val_filename: prism_tts-val-stage={val_stage:05d}-step={step:07d}
    every_val_save_weights_only: false

  logger:
    type: wandb
    project: prism_tts
    name: null
    save_dir: logs
    offline: false
    log_model: false
