# PrismTTS model defaults.
# Keep this aligned with config/data.yaml shared layout.

model:
  name: prism_tts

  # Backbone selection + optional Hugging Face initialization.
  # Runtime env vars can override these values:
  # PRISM_TTS_BACKBONE(_NAME), PRISM_TTS_BACKBONE_HF_CHECKPOINT,
  # PRISM_TTS_HF_TOKEN / HUGGINGFACE_HUB_TOKEN / HF_TOKEN, etc.
  backbone:
    # Supported: llama, gemma, qwen
    name: gemma3
    # Optional: override the config section key. Defaults to "<name>_config".
    # config_key: llama_config
    # Optional HF checkpoint for initializing the selected backbone.
    # Examples:
    #   - meta-llama/Llama-3.2-1B
    #   - google/gemma-3-1b-it
    #   - Qwen/Qwen3-1.7B
    # Default HF checkpoint for selected backbone (`name` above).
    # If you switch backbone name, update this accordingly.
    hf_checkpoint: google/gemma-3-270m
    hf_strict: true
    # Optional HF loader options (used only when hf_checkpoint is set).
    hf_token: null
    hf_revision: null
    hf_cache_dir: null
    hf_subfolder: null
    hf_trust_remote_code: false
    hf_local_files_only: false
    hf_force_download: false

  prism_tts:
    # Number of discrete streams per speech block.
    # When data.dataset.discrete_stream_count is set, train.py resolves this
    # from dataset config (this value is fallback/default only).
    num_discrete_tokens: 4
    # Must cover codec ids + EOT/EOS/PAD special ids.
    # For discrete_token_count=2048, minimum valid value is 2051.
    discrete_vocab_size: 2051
    continuous_latent_size: 512
    flow_num_res_blocks: 4
    flow_model_channels: 512
    # Loss weights for masked speech-block reconstruction.
    continuous_loss_weight: 1.0
    flow_loss_weight: 1.0
    # Per-token CE weights for discrete stream training:
    # regular = codec IDs, special = EOT/EOS/PAD.
    discrete_regular_token_loss_weight: 1.0
    discrete_special_token_loss_weight: 0.1
    flow_sample_steps: 64
    parallel_sample_steps: 64

  llama_config:
    # Must be >= text_token_offset + num_text_vocab_tokens.
    # With current config/data.yaml + dataset/vocab.txt: 2051 + 304 = 2355.
    vocab_size: 2444
    hidden_size: 768
    intermediate_size: 3072
    num_hidden_layers: 12
    num_attention_heads: 12
    num_key_value_heads: 12
    max_position_embeddings: 8192
    rope_theta: 10000.0
    rms_norm_eps: 1.0e-6
    initializer_range: 0.02
    pad_token_id: 2050
    eos_token_id: 2049
    use_cache: false
    tie_word_embeddings: false
    # Prefer memory-efficient attention for training stability/performance.
    _attn_implementation: sdpa

  # Implicit local config for Gemma backbone initialization (no HF fetch needed).
  gemma_config:
    # Defaults aligned to `google/gemma-3-270m` architecture.
    # Keep pad/eos adapted to Prism shared layout in config/data.yaml.
    vocab_size: 262144
    hidden_size: 640
    intermediate_size: 2048
    num_hidden_layers: 18
    num_attention_heads: 4
    num_key_value_heads: 1
    head_dim: 256
    max_position_embeddings: 32768
    rms_norm_eps: 1.0e-6
    initializer_range: 0.02
    pad_token_id: 2050
    eos_token_id: 2049
    use_cache: false
    tie_word_embeddings: true
    attention_bias: false
    attention_dropout: 0.0
    hidden_activation: gelu_pytorch_tanh
    sliding_window: 512
    query_pre_attn_scalar: 256
    layer_types:
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - full_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - full_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - sliding_attention
      - full_attention
    rope_parameters:
      sliding_attention:
        rope_type: default
        rope_theta: 10000.0
      full_attention:
        rope_type: default
        rope_theta: 1000000.0

  # Implicit local config for Qwen backbone initialization (no HF fetch needed).
  qwen_config:
    # Defaults aligned to `Qwen/Qwen3-0.6B` architecture.
    # Keep pad/eos adapted to Prism shared layout in config/data.yaml.
    vocab_size: 151936
    hidden_size: 1024
    intermediate_size: 3072
    num_hidden_layers: 28
    num_attention_heads: 16
    num_key_value_heads: 8
    head_dim: 128
    max_position_embeddings: 40960
    rms_norm_eps: 1.0e-6
    initializer_range: 0.02
    pad_token_id: 2050
    eos_token_id: 2049
    use_cache: false
    tie_word_embeddings: true
    hidden_act: silu
    attention_bias: false
    attention_dropout: 0.0
    use_sliding_window: false
    max_window_layers: 28
    layer_types:
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
      - full_attention
    rope_parameters:
      rope_type: default
      rope_theta: 1000000.0
