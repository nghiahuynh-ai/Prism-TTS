# Dataset + dataloader defaults.
# Expected manifest line format:
# file_name|duration|transcript|target_npy|prompt_file_name|prompt_duration|prompt_transcript|prompt_npy

data:
  train_manifest: /astro/nghiahuynh/data/emilia/metadata-1000-max20-train.txt
  val_manifest: /astro/nghiahuynh/data/emilia/metadata-1000-max20-val.txt
  test_manifest: null
  # Keep null to resolve relative paths against the manifest directory.
  manifest_root: null
  vocab_path: dataset/vocab.txt

  loader:
    # Variable-length batches can spike attention memory; keep a conservative
    # per-device batch size and scale effective batch with grad accumulation.
    train_batch_size: 4
    val_batch_size: 4
    test_batch_size: 4
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
    drop_last_train: false
    shuffle_train: true
    shuffle_val: false
    shuffle_test: false
    adaptive_batching:
      # Set true to enable dynamic batch sizes based on estimated memory usage.
      enabled: true
      # Target utilization against the configured/derived memory_budget.
      target_memory_utilization: 0.9
      # Optional absolute budget in "cost units" (batch_size * max_len^2).
      # null -> derive from train_batch_size and a reference sequence-length quantile.
      memory_budget: null
      # Optional direct target in "cost units"; overrides utilization*memory_budget.
      target_batch_cost: 3000000
      # Quantile used when deriving memory_budget automatically.
      reference_length_quantile: 0.95
      # Upper bound for dynamic batch size (allows adding samples when memory is underused).
      max_batch_size: 64
      # Sampler RNG seed; null falls back to trainer.seed (or 0).
      seed: null

  shared_layout:
    # Discrete ids are [0, discrete_token_count - 1].
    # Special ids are derived by build_shared_token_layout().
    discrete_token_count: 2048
    eot_token_id: 2048
    eos_token_id: 2049
    pad_token_id: 2050
    text_token_offset: 2051

  dataset:
    # PrismDataset(...) arguments.
    append_eos_to_text: false
    cache_npy: false
    discrete_stream_count: 1
    continuous_feature_dim: 512

  collate:
    # BatchCollate(...) arguments.
    text_pad_value: null
    discrete_pad_value: null
    continuous_pad_value: 0.0
    include_attention_mask: true
    codec_frame_rate_hz: 12.5
