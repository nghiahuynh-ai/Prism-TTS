experiment:
  # Optional: pick alternative base config files.
  # `train.py` reads these and then applies the overrides below.
  config_paths:
    trainer: config/trainer.yaml
    model: config/model.yaml
    data: config/data.yaml

  # Free-form experiment name (used for logging/checkpoint naming below).
  name: prism_tts

  # Keep trainer defaults in config/trainer.yaml and override only
  # experiment-specific values here.
  trainer:
    logger:
      name: mask-disc

    checkpoint:
      dirpath: checkpoints/mask-dsc

    distributed:
      enabled: true

  # data:
  #   Optional per-experiment data overrides.
  #   Leave unset to use paths from config/data.yaml.
  #   Example:
  #   train_manifest: /path/to/train_manifest.txt
  #   val_manifest: /path/to/val_manifest.txt
  #   test_manifest: null
  #   manifest_root: /path/to/feature_root
  #   vocab_path: dataset/vocab.txt
